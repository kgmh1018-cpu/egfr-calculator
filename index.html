<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eGFR 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <div class="topbar-title">
    <span>eGFR 계산기</span>
    <span>CKD-EPI 2021</span>
  </div>
  <div id="topbar-controls"></div>
  <div id="stage-chips"></div>
</div>

<div id="main">

  <div id="left-panel">

    <div class="panel-section">
      <div id="gender-toggle">
        <button class="gender-btn active" data-g="male">♂ 남성</button>
        <button class="gender-btn" data-g="female">♀ 여성</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-name">나이</span>
          <span><span class="slider-value" id="age-val">40</span><span class="slider-unit">세</span></span>
        </div>
        <input type="range" id="age-slider" min="18" max="100" step="1" value="40">
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-name">혈청 크레아티닌 (sCr)</span>
          <span><span class="slider-value" id="scr-val">1.00</span><span class="slider-unit">mg/dL</span></span>
        </div>
        <input type="range" id="scr-slider" min="0.3" max="15.0" step="0.05" value="1.00">
      </div>
      <div class="slider-row">
        <div class="slider-header">
          <span class="slider-name">eGFR</span>
          <span><span class="slider-value" id="egfr-val">—</span><span class="slider-unit">mL/min/1.73m²</span></span>
        </div>
        <input type="range" id="egfr-slider" min="5" max="130" step="1" value="90">
      </div>
    </div>

    <div class="panel-section">
      <div id="result-box">
        <div class="result-gfr" id="result-gfr">—</div>
        <div class="result-unit">mL/min/1.73m²</div>
        <div class="result-badge" id="result-badge">—</div>
        <div class="result-desc" id="result-desc">—</div>
        <div id="dialysis-warning">⚠ 신대체요법(투석/이식) 고려</div>
        <div id="mobile-stage-chips"></div>
      </div>
    </div>

  </div>

  <div id="right-panel">

    <div id="filter-bar">
      <button class="filter-tab active" data-cat="all">전체 <span class="tab-badge" id="badge-all">0</span></button>
      <button class="filter-tab" data-cat="혈당강하제">혈당강하제 <span class="tab-badge" id="badge-혈당강하제">0</span></button>
      <button class="filter-tab" data-cat="진통소염제">진통소염제 <span class="tab-badge" id="badge-진통소염제">0</span></button>
      <button class="filter-tab" data-cat="항생제">항생제 <span class="tab-badge" id="badge-항생제">0</span></button>
      <button class="filter-tab" data-cat="심혈관계">심혈관계 <span class="tab-badge" id="badge-심혈관계">0</span></button>
      <button class="filter-tab" data-cat="조영제">조영제 <span class="tab-badge" id="badge-조영제">0</span></button>
      <button class="filter-tab" data-cat="항응고제">항응고제 <span class="tab-badge" id="badge-항응고제">0</span></button>
      <button class="filter-tab" data-cat="기타">기타 <span class="tab-badge" id="badge-기타">0</span></button>
      <div class="filter-spacer"></div>
      <button id="expand-all-btn">펼치기 ▼</button>
      <button id="show-imp-wrap">⭐ 중요약물만</button>
      <button id="show-safe-wrap" class="active">안전한 약 보기</button>
    </div>

    <div id="drug-list"></div>

  </div>

</div>

<nav id="mobile-tab-nav">
  <button class="mob-tab" id="mob-tab-input" onclick="switchTab('input')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
    </svg>
    입력 · 결과
  </button>
  <button class="mob-tab" id="mob-tab-drugs" onclick="switchTab('drugs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0016.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 002 8.5c0 2.3 1.5 4.05 3 5.5l7 7z"/>
    </svg>
    약물 위험
    <span class="mob-tab-indicator" id="mob-drug-indicator"></span>
  </button>
</nav>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
